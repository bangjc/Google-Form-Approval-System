<!DOCTYPE html>
<html>
  <head>
    <style>
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; }
      .container { max-width: 600px; margin: 20px auto; border: 1px solid #ddd; padding: 30px; border-radius: 10px; background-color: #f9f9f9; }
      .header { text-align: center; border-bottom: 2px solid #444; padding-bottom: 10px; margin-bottom: 20px; }
      .title { font-size: 20px; font-weight: bold; text-transform: uppercase; }
      .memo-info { background: #fff; padding: 15px; border-radius: 5px; margin-bottom: 20px; border-left: 4px solid #0056b3; }
      
      .content-table { width: 100%; border-collapse: collapse; margin: 20px 0; background: #fff; }
      .content-table th { background-color: #0056b3; color: #fff; padding: 12px; border: 1px solid #ddd; text-align: center; }
      .content-table td { padding: 12px; border: 1px solid #ddd; text-align: center; }
      
      .total-row { background-color: #e9ecef; font-weight: bold; }
      
      .btn-group { text-align: center; margin-top: 30px; }
      .btn { padding: 12px 25px; color: #FFFFFF; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block; }
      .btn-approve { background-color: #28a745; }
      .btn-decline { background-color: #dc3545; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="title">Header/Judl</div>
        <div style="font-weight: bold;"><?= data.metode ?></div>
      </div>
      
      <div class="memo-info">
        <strong>Kepada:</strong> ?????????<br>
        <strong>Tanggal:</strong> <?= data.tanggal ?><br>
        <strong>Subject:</strong> Pengajuan ?????
      </div>

      <p>Dengan hormat,</p>
      <p>isi pengajuan</p>
      
      <table class="content-table">
        <thead>
          <tr>
            <th>No</th>
            <th>No. PO</th>
            <th>Keterangan</th>
            <th>Nilai Transaksi</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td><?= data.po ?></td>
            <td><?= data.note ?></td>
            <td><?= data.amount ?></td>
          </tr>
          <tr class="total-row">
            <td colspan="3" style="text-align: right; padding-right: 20px;">TOTAL</td>
            <td><?= data.amount ?></td>
          </tr>
        </tbody>
      </table>
      <p></p>
      <table class="content-table" border="0">
        <thead>
          <tr>
            <th>acc1</th>
            <th>acc2</th>
            <th>acc3</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><?= data.acc1 ?><br><i>[<?= data.acc1_timestamp ?>]</i></td>
            <td><?= data.acc2 ?><br><i>[<?= data.acc2_timestamp ?>]</i></td>
            <td><?= data.acc3 ?><br><i>[<?= data.acc3_timestamp ?>]</i></td>
          </tr>
        </tbody>
      </table>

      <div class="btn-group">
        <p>Apakah Anda menyetujui pengajuan ini?</p>
        <a href="<?= data.approveUrl ?>" class="btn btn-approve">APPROVE</a>
        <a href="<?= data.declineUrl ?>" class="btn btn-decline">DECLINE</a>
      </div>
    </div>
  </body>
</html>
